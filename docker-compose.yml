services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: tasks
      POSTGRES_PASSWORD: tasks
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=scram-sha-256
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks -d tasks"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

  task-scheduler:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_PORT: 8080
      DATABASE_URL: postgres://tasks:tasks@postgres:5432/tasks?sslmode=disable
      SCHEDULER_POLL_INTERVAL: 1s
      SCHEDULER_BATCH_SIZE: 10
      RETRY_BASE_DELAY: 5s
      REQUEST_TIMEOUT: 15s
      SHUTDOWN_TIMEOUT: 10s
    ports:
      - "8080:8080"

volumes:
  pg_data:
